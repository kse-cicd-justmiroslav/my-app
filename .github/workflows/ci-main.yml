name: Main Build

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  docker-build-push:
    needs: build-and-test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        shell: pwsh
        run: |
          $image = "ghcr.io/$env:GITHUB_REPOSITORY".ToLower()
          echo "IMAGE=$image" >> $env:GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}

  sbom-and-scan:
    needs: docker-build-push
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        shell: pwsh
        run: |
          $image = "ghcr.io/$env:GITHUB_REPOSITORY".ToLower()
          echo "IMAGE=$image" >> $env:GITHUB_ENV

      - name: Generate SBOM with Trivy
        shell: pwsh
        run: |
          docker run --rm `
            -v "${{ github.workspace }}:/output" `
            aquasec/trivy:latest image `
            --format cyclonedx `
            --output /output/sbom.cdx.json `
            "${env:IMAGE}:${env:GITHUB_SHA}"

      - name: Upload SBOM to Dependency-Track
        shell: pwsh
        run: |
          curl.exe -sf -X POST "${env:DTRACK_URL}/api/v1/bom" `
            -H "X-Api-Key: ${env:DTRACK_API_KEY}" `
            -H "Content-Type: multipart/form-data" `
            -F "projectName=my-app" `
            -F "projectVersion=${env:GITHUB_SHA}" `
            -F "autoCreate=true" `
            -F "bom=@sbom.cdx.json"
        env:
          DTRACK_URL: ${{ vars.DTRACK_URL }}
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}

      - name: Run Trivy container scan
        shell: pwsh
        run: |
          docker run --rm `
            -v "${{ github.workspace }}:/output" `
            aquasec/trivy:latest image `
            --format sarif `
            --output /output/trivy-image-results.sarif `
            --severity CRITICAL,HIGH `
            --ignore-unfixed `
            "${env:IMAGE}:${env:GITHUB_SHA}"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif

  update-deployment:
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/kse-labs-deployment
          token: ${{ secrets.DEPLOYMENT_PAT }}

      - name: Update image tag
        run: |
          sed -i "s|image: ghcr.io/${{ github.repository }}:.*|image: ghcr.io/${{ github.repository }}:${{ github.sha }}|" \
            applications/my-app/deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add applications/my-app/deployment.yaml
          git diff --cached --quiet || \
            (git commit -m "deploy: my-app ${{ github.sha }}" && git push)

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Run secret scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/scan \
            ghcr.io/kse-cicd-justmiroslav/secret-scan-tool:latest \
            /scan/